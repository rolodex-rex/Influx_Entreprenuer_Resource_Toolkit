            { name: "Google TTS and SST", cat: "CLOUD, DATABASES & APIS", desc: "Text-to-Speech and Speech-to-Text tools integrated with framework methods to allow voice-activated app building.", os: false, link: "https://cloud.google.com/speech-to-text" },
            { name: "Yelp API", cat: "CLOUD, DATABASES & APIS", desc: "An application programming interface used to aggregate local business data for custom research platforms.", os: false, link: "https://fusion.yelp.com" },
            { name: "Yahoo API", cat: "CLOUD, DATABASES & APIS", desc: "A search API utilized by developers to bypass standard Google limitations for comprehensive multi-site deep research tools.", os: false, link: "https://developer.yahoo.com" },
            { name: "Bing API", cat: "CLOUD, DATABASES & APIS", desc: "Microsoft's search API, leveraged by agents for automated internet searching alongside other search endpoints.", os: false, link: "https://google.com/search?q=Bing+Search+API" },
            { name: "Google Search API", cat: "CLOUD, DATABASES & APIS", desc: "Google's primary search endpoint used to query the broader web programmatically via custom MCP servers.", os: false, link: "https://google.com/search?q=Google+Search+API" },
            { name: "Pinterest API", cat: "CLOUD, DATABASES & APIS", desc: "An interface to pull image and pin data from the Pinterest platform for highly specialized custom data extraction.", os: false, link: "https://developers.pinterest.com" },
            { name: "YouTube API", cat: "CLOUD, DATABASES & APIS", desc: "A free API endpoint that allows AI frameworks to scan and retrieve YouTube video and channel data seamlessly.", os: false, link: "https://developers.google.com/youtube/" },
            { name: "Kaggle", cat: "CLOUD, DATABASES & APIS", desc: "A platform and repository used specifically as a 'plug' for sourcing diverse data sets to connect to BI interfaces.", os: false, link: "https://kaggle.com" },
            { name: "Helium Network (HNT)", cat: "CLOUD, DATABASES & APIS", desc: "A decentralized network whose nodes are occasionally exploited in rentals by users passively mining crypto.", os: true, link: "https://www.helium.com" },
            { name: "Nvidia Developer Program", cat: "CLOUD, DATABASES & APIS", desc: "A free developer platform that grants users access to high-end GPUs, agents, and testing environments.", os: false, link: "https://developer.nvidia.com" },
            { name: "The Simple Claude Cowork OS", cat: "EDUCATIONAL RESOURCES", desc: "A 20-minute YouTube onboarding video resource teaching users how to set up a simple Claude operating system using custom skills.", os: false, link: "https://youtu.be/NjYZW-1bLMo" },
            { name: "INTERACTIVE CLAUDE FULL COURSE", cat: "EDUCATIONAL RESOURCES", desc: "A comprehensive 4-hour video masterclass explaining how to build, automate, and sell a personal AI operating system.", os: false, link: "https://youtu.be/KTEe5705RHw" }
        ];

        window.toolVotes = {};
        window.forumThreads = [];
        
        let currentUser = null;
        let db, auth, appId;
        let useCloud = false;

        // Initialize Real-Time Database Connection
        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                useCloud = true;
                
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tool_votes'), (snapshot) => {
                            snapshot.docs.forEach(d => { window.toolVotes[d.id] = d.data().votes || 0; });
                            window.renderTools();
                        }, (e) => console.error(e));
                        
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'forum_threads'), (snapshot) => {
                            window.forumThreads = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                            window.forumThreads.sort((a, b) => b.createdAt - a.createdAt);
                            window.renderForum();
                        }, (e) => console.error(e));
                    }
                });
            }
        } catch (e) {
            console.warn("Cloud infrastructure not found. Using local session data.");
        }

        window.renderTools = function() {
            const grid = document.getElementById('toolGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            
            grid.innerHTML = tools.filter(t => (cat === 'All' || t.cat === cat) && (t.name.toLowerCase().includes(search))).map((t) => {
                const safeId = t.name.replace(/[^a-zA-Z0-9]/g, '_');
                const votes = window.toolVotes[safeId] || 0;
                const idx = tools.findIndex(x => x.name === t.name);

                return `
                <div class="tool-card p-5 relative">
                    <button onclick="vote(${idx})" class="absolute top-4 right-4 text-white font-black text-3xl upvote-shadow z-10 hover:scale-110 transition-transform ${votes > 0 ? 'text-red-500' : ''}">♥ <span class="text-xl">${votes}</span></button>
                    <div class="flex flex-col gap-2 mb-4 h-12 pr-16">
                        <span class="pill bg-yellow-400 text-black border-black">${t.cat}</span>
                        ${t.os ? '<span class="pill bg-[#5b21b6] text-white border-black">OPEN SOURCE</span>' : '<span class="pill bg-[#1e3a8a] border-black opacity-0"></span>'}
                    </div>
                    <h3 class="font-black text-2xl text-white mb-3 text-shadow-hard leading-tight pr-16">${t.name}</h3>
                    <p class="text-white text-sm font-bold opacity-100 mb-6 flex-grow text-shadow-hard min-h-[3rem] leading-relaxed">${t.desc}</p>
                    <a href="${t.link}" target="_blank" class="btn-tool text-center block mt-auto hover:bg-yellow-500">ACCESS TOOL</a>
                </div>
            `}).join('');
        };

        window.vote = async function(idx) {
            const t = tools[idx];
            const safeId = t.name.replace(/[^a-zA-Z0-9]/g, '_');
            
            // Optimistic UI Update
            window.toolVotes[safeId] = (window.toolVotes[safeId] || 0) + 1;
            window.renderTools();

            // Cloud Persist if Available
            if (useCloud && currentUser) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tool_votes', safeId), { votes: window.toolVotes[safeId] }, { merge: true });
                } catch(e) { console.error(e); }
            }
        };

        window.renderForum = function() {
            const list = document.getElementById('threadList');
            list.innerHTML = window.forumThreads.map(thread => `
                <div class="bg-[#1e3a8a] p-6 border-2 border-black shadow-[6px_6px_0px_0px_#000] relative">
                    <h3 class="text-yellow-400 font-black text-2xl mb-1 text-shadow-hard pr-20">${thread.title}</h3>
                    <p class="text-sm font-black text-gray-300 mb-4">BY ${thread.username.toUpperCase()}</p>
                    <p class="text-white font-bold mb-4 text-shadow-hard">${thread.text}</p>
                    <div class="replies-container border-l-2 border-yellow-400 pl-4 space-y-2 mb-4">
                        ${(thread.replies || []).map(r => `
                            <div class="py-2">
                                <span class="text-yellow-400 font-black text-shadow-hard">${r.username}:</span>
                                <span class="text-white font-bold text-shadow-hard">${r.text}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <input type="text" id="replyUser_${thread.id}" placeholder="Username..." class="bg-[#0f172a] p-3 text-white border-2 border-black w-full sm:w-1/4 focus:outline-none search-yellow" style="color: #facc15;">
                        <input type="text" id="replyText_${thread.id}" placeholder="Add a comment..." class="flex-1 bg-[#0f172a] p-3 text-white border-2 border-black focus:outline-none search-yellow" style="color: #facc15;">
                        <button onclick="addReply('${thread.id}')" class="bg-yellow-400 text-black px-6 font-black border-2 border-black hover:bg-yellow-500">REPLY</button>
                    </div>
                </div>
            `).join('');
        };

        window.addThread = async function() {
            const title = document.getElementById('threadTitle').value.trim();
            const text = document.getElementById('commentText').value.trim();
            let username = document.getElementById('threadUsername').value.trim() || 'Anonymous';
            if(!title || !text) return;
            
            const threadData = { title, text, username, createdAt: Date.now(), replies: [] };
            
            if (useCloud && currentUser) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'forum_threads'), threadData);
                    document.getElementById('threadTitle').value = '';
                    document.getElementById('commentText').value = '';
                } catch(e) { console.error(e); }
            } else {
                threadData.id = Date.now().toString();
                window.forumThreads.unshift(threadData);
                window.renderForum();
                document.getElementById('threadTitle').value = '';
                document.getElementById('commentText').value = '';
            }
        };

        window.addReply = async function(threadId) {
            const userInp = document.getElementById(`replyUser_${threadId}`).value.trim();
            const textInp = document.getElementById(`replyText_${threadId}`).value.trim();
            const username = userInp || 'Anonymous';
            if (!textInp) return;

            const threadIndex = window.forumThreads.findIndex(t => t.id === threadId);
            if (threadIndex === -1) return;
            
            const newReplies = [...(window.forumThreads[threadIndex].replies || []), { username, text: textInp, createdAt: Date.now() }];

            if (useCloud && currentUser) {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'forum_threads', threadId), { replies: newReplies });
                } catch(e) { console.error(e); }
            } else {
                window.forumThreads[threadIndex].replies = newReplies;
                window.renderForum();
            }
        };

        window.setTab = function(tab) {
            document.getElementById('toolsSection').classList.toggle('hidden', tab !== 'toolkit');
            document.getElementById('forumSection').classList.toggle('hidden', tab !== 'forum');
            document.getElementById('btnToolkit').classList.toggle('btn-active', tab === 'toolkit');
            document.getElementById('btnForum').classList.toggle('btn-active', tab === 'forum');
        };

        const cats = [...new Set(tools.map(t => t.cat))];
        cats.forEach(c => document.getElementById('categoryFilter').innerHTML += `<option value="${c}">${c}</option>`);
        
        window.renderTools();
        window.renderForum();
    </script>
</body>
</html>
